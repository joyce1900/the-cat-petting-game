<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Cat Petting Game</title>
    <style>
      html, body, #root { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      body { background: #1a1410; }

      /* Force pixel-art-style rendering on all canvas and img elements.
         When the browser scales these up, use nearest-neighbor (hard pixels)
         instead of smoothing. Multiple values listed for cross-browser support
         since not all browsers accept the same keyword. */
      canvas, img {
        image-rendering: pixelated;          /* Chrome, Edge, modern Firefox */
        image-rendering: -moz-crisp-edges;   /* older Firefox */
        image-rendering: crisp-edges;        /* Safari, fallback */
        -ms-interpolation-mode: nearest-neighbor; /* old IE */
      }

      /* Custom mouse cursor — pointing-hand by default everywhere in the game.
         The "1 1" pair is the cursor hotspot in pixels (top-left = fingertip).
         The "auto" at the end is a fallback in case the PNG fails to load.
         When the cursor is over an interactable cat, an inline style on the
         canvas overrides this with the petting-hand cursor. */
      html, body, button, canvas, * {
        cursor: url('/art/cursor_pointinghand.png') 1 1, auto;
      }

      /* Floating fur particles spawned during petting (Entry 34).
         Each particle drifts from its spawn point in a random direction with
         a small rotation, fading out over ~900ms. The per-particle direction
         is set via inline --dx, --dy, --rot CSS variables. */
      .fur-particle {
        position: absolute;
        pointer-events: none;
        animation: fur-drift 900ms ease-out forwards;
        will-change: transform, opacity;
      }
      @keyframes fur-drift {
        0%   { transform: translate(-50%, -50%) rotate(0deg); opacity: 1; }
        100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(var(--rot)); opacity: 0; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
